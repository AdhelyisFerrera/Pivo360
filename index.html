<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasantía Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f6e56">

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
</script>

<style>
:root {
  --bg: #f5f7f5;
  --text: #1a1a1a;
  --card: #fff;
  --green: #0f6e56;
}

.dark {
  --bg: #121212;
  --text: #ffffff;
  --card: #1e1e1e;
}

body {
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 8px;
}

.toggle-theme {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="toggle-theme" onclick="toggleTheme()" id="themeBtn">🌙</div>

<div class="container">

<h2>Agregar día</h2>

<div class="card">
  <label>Fecha</label>
  <input type="date" id="date">

  <label>Hora entrada</label>
  <input type="time" id="start">

  <label>Hora salida</label>
  <input type="time" id="end">

  <button onclick="addDay()">Guardar</button>
</div>

<h2>Historial</h2>
<div id="list"></div>

</div>

<script>
let days = JSON.parse(localStorage.getItem('days') || '[]');

function calcHours(start, end) {
  const s = start.split(':');
  const e = end.split(':');

  let sh = parseInt(s[0]) + parseInt(s[1]) / 60;
  let eh = parseInt(e[0]) + parseInt(e[1]) / 60;

  return (eh - sh).toFixed(2);
}

function addDay() {
  const date = document.getElementById('date').value;
  const start = document.getElementById('start').value;
  const end = document.getElementById('end').value;

  if (!date || !start || !end) {
    alert("Completa todos los campos");
    return;
  }

  const hours = calcHours(start, end);

  days.push({ date, start, end, hours });
  localStorage.setItem('days', JSON.stringify(days));

  render();
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  days.forEach(d => {
    list.innerHTML += `
      <div class="card">
        <b>${d.date}</b><br>
        Entrada: ${d.start} - Salida: ${d.end}<br>
        <b>${d.hours} horas</b>
      </div>
    `;
  });
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');

  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
}

function loadTheme() {
  const t = localStorage.getItem('theme');
  if (t === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }
}

render();
loadTheme();
</script>

</body>
</html>
